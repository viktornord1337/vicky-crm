<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d10; --surface: #151519; --surface2: #1c1c22; --surface3: #222228;
      --border: #2a2a35; --border2: #333340;
      --accent: #7c5af6; --accent-hover: #8f6cf8;
      --red: #e05a5a; --orange: #fb923c; --blue: #60a5fa; --green: #4ade80; --purple: #c084fc;
      --text: #e8e8f0; --muted: #6b6b80; --subtle: #4a4a5a;
      --sidebar-w: 220px; --activity-w: 260px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: grid; grid-template-rows: 44px 1fr; overflow: hidden; }

    /* TOP BAR */
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 100; }
    .topbar-logo { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: var(--text); margin-right: 8px; }
    .topbar-logo span { font-size: 18px; }
    .topbar-search { flex: 1; max-width: 280px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 12px; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px; cursor: text; }
    .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .topbar-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 12px; font-size: 12px; color: var(--muted); cursor: pointer; }
    .topbar-btn:hover { color: var(--text); border-color: var(--border2); }
    .topbar-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--green); }
    .pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
    .avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: white; cursor: pointer; overflow: hidden; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* MAIN LAYOUT */
    .layout { display: grid; grid-template-columns: var(--sidebar-w) 1fr var(--activity-w); overflow: hidden; }

    /* SIDEBAR */
    .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; padding: 12px 0; }
    .sidebar-section { padding: 0 8px; margin-bottom: 4px; }
    .sidebar-label { font-size: 10px; text-transform: uppercase; letter-spacing: .8px; color: var(--subtle); padding: 0 8px; margin: 16px 0 6px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--muted); transition: all .12s; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--surface3); color: var(--text); }
    .nav-item .icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
    .nav-item .badge { margin-left: auto; background: var(--surface3); border-radius: 20px; padding: 1px 7px; font-size: 10px; color: var(--muted); }
    .nav-bottom { margin-top: auto; padding: 12px 8px; border-top: 1px solid var(--border); }

    /* MAIN CONTENT */
    .main { display: flex; flex-direction: column; overflow: hidden; }
    .main-header { padding: 16px 24px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .stats-row { display: flex; align-items: baseline; gap: 28px; }
    .stat-item { display: flex; align-items: baseline; gap: 6px; }
    .stat-num { font-size: 28px; font-weight: 800; }
    .stat-num.accent { color: var(--green); }
    .stat-num.accent2 { color: var(--blue); }
    .stat-num.accent3 { color: var(--accent); }
    .stat-label { font-size: 12px; color: var(--muted); }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .btn-new { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; box-shadow: 0 2px 12px rgba(124,90,246,.3); transition: all .15s; }
    .btn-new:hover { background: var(--accent-hover); box-shadow: 0 4px 20px rgba(124,90,246,.4); }
    .filter-chips { display: flex; align-items: center; gap: 6px; }
    .chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 12px; color: var(--muted); cursor: pointer; }
    .chip:hover { color: var(--text); }
    .chip.active { background: var(--surface3); color: var(--text); border-color: var(--border2); }

    /* DEAL LIST */
    .deal-list { padding: 16px 24px; border-top: 1px solid var(--border); }
    .deal-list h3 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
    #dealTable { width: 100%; border-collapse: collapse; font-size: 13px; }
    #dealTable th, #dealTable td { padding: 8px 12px; }
    #dealTable th { background: var(--surface2); text-align: left; cursor: pointer; }
    #dealTable td { border-bottom: 1px solid var(--border); }
    #dealTable tr:last-child td { border-bottom: none; }
    #dealTable tr { cursor: pointer; transition: background .15s; }
    #dealTable tr:hover { background: var(--surface3); }
    #dealTable th:nth-child(2), #dealTable td:nth-child(2) { text-align: right; }
    #dealTable th:nth-child(4), #dealTable td:nth-child(4) { text-align: right; }

    /* LIVE ACTIVITY */
    .activity { background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .activity-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 700; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
    .activity-live { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--green); }
    .activity-feed { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 2px; }
    .activity-item { padding: 10px 10px; border-radius: 8px; transition: background .12s; cursor: default; }
    .activity-item:hover { background: var(--surface2); }
    .activity-agent { font-size: 11px; font-weight: 700; border-radius: 4px; padding: 1px 7px; display: inline-block; margin-bottom: 4px; }
    .ag-vicky { background: rgba(124,90,246,.2); color: #a07cf8; }
    .ag-scout { background: rgba(74,222,128,.15); color: var(--green); }
    .ag-research { background: rgba(96,165,250,.15); color: var(--blue); }
    .ag-system { background: rgba(251,146,60,.12); color: var(--orange); }
    .activity-text { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .activity-time { font-size: 10px; color: var(--subtle); margin-top: 3px; }
    .activity-divider { height: 1px; background: var(--border); margin: 4px 0; }

    /* HIDDEN BY DEFAULT */
    .tab-content { display: none; }
    .tab-content.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    .page { display: none; }
    .page.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo"><span>🦊</span> CRM Dashboard</div>
  <div class="topbar-search">🔍 <span>Sök deals... ⌘K</span></div>
  <div class="topbar-actions">
    <div class="topbar-status"><div class="pulse-dot"></div>Online</div>
    <div class="topbar-btn" onclick="exportCSV()">📤 Export CSV</div>
    <div class="avatar"><img src="/Users/nord1/.openclaw/workspace/vicky-discord-avatar.png" onerror="this.style.background='var(--accent)';this.style.content='V'"></div>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="nav-item active" onclick="switchPage('pipeline',this)"><span class="icon">📊</span>Pipeline</div>
      <div class="nav-item" onclick="switchPage('deals',this)"><span class="icon">💼</span>Deals</div>
      <div class="nav-item" onclick="switchPage('reports',this)"><span class="icon">📈</span>Reports</div>
    </div>
    <div class="sidebar-label">Automation</div>
    <div class="sidebar-section">
      <div class="nav-item" onclick="switchPage('chronos',this)"><span class="icon">📅</span>Calendar<span class="badge">2</span></div>
    </div>
    <div class="nav-bottom">
      <div class="nav-item" style="font-size:12px"><span class="icon">⚙️</span>Settings</div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">
    <div class="page active" id="page-pipeline">
      <div class="main-header">
        <div class="stats-row">
          <div class="stat-item"><span class="stat-num accent">$150,000</span><span class="stat-label">Total Pipeline</span></div>
          <div class="stat-item"><span class="stat-num accent2">15</span><span class="stat-label">Deals</span></div>
          <div class="stat-item"><span class="stat-num accent3">68%</span><span class="stat-label">Win Rate</span></div>
        </div>
      </div>
      <div class="deal-list">
        <h3>Deal List</h3>
        <table id="dealTable">
          <thead>
            <tr>
              <th onclick="sortTable(0)">Name</th>
              <th onclick="sortTable(1)">Value</th>
              <th onclick="sortTable(2)">Stage</th>
              <th onclick="sortTable(3)">Probability</th>
            </tr>
          </thead>
          <tbody>
            <!-- Deals loaded here from mock JSON -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- LIVE ACTIVITY -->
  <div class="activity">
    <div class="activity-header">
      Live Activity
      <div class="activity-live"><div class="pulse-dot"></div>Live</div>
    </div>
    <div class="activity-feed" id="activityFeed">
      <div class="activity-empty">Inga aktiva processer just nu.</div>
    </div>
  </div>

</div>

<script>
// Load mock HubSpot data
fetch('/Users/nord1/.openclaw/workspace/mock-hubspot.json')
  .then(r => r.json())
  .then(data => {
    const tbody = document.getElementById('dealTable').querySelector('tbody');
    data.deals.forEach(deal => {
      const tr = document.createElement('tr');
      tr.onclick = () => alert('Opening deal: ' + deal.name);
      tr.innerHTML = `
        <td>${deal.name}</td>
        <td style="text-align: right;">${deal.amount.toLocaleString()} SEK</td>
        <td>${deal.stage}</td>
        <td style="text-align: right;">${deal.probability}%</td>
      `;
      tbody.appendChild(tr);
    });
  });

// Sort table function
function sortTable(n) {
  var table = document.getElementById("dealTable");
  var switching = true, dir = "asc", switchcount = 0;
  while (switching) {
    switching = false;
    var rows = table.rows;
    for (var i = 1; i < (rows.length - 1); i++) {
      var shouldSwitch = false;
      var x = rows[i].getElementsByTagName("TD")[n];
      var y = rows[i + 1].getElementsByTagName("TD")[n];
      var xVal = x.innerHTML.toLowerCase();
      var yVal = y.innerHTML.toLowerCase();
      if (n === 1) xVal = parseFloat(xVal.replace(/[^0-9.-]+/g,"")); yVal = parseFloat(yVal.replace(/[^0-9.-]+/g,""));
      if (n === 3) xVal = parseFloat(xVal); yVal = parseFloat(yVal);
      if (dir == "asc") {
        if (xVal > yVal) shouldSwitch = true;
      } else if (dir == "desc") {
        if (xVal < yVal) shouldSwitch = true;
      }
      if (shouldSwitch) {
        rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
        switching = true;
        switchcount ++;
      }
    }
    if (switchcount == 0 && dir == "asc") {
      dir = "desc";
      switching = true;
    }
  }
}

// Export CSV
function exportCSV() {
  fetch('/Users/nord1/.openclaw/workspace/mock-hubspot.json')
    .then(r => r.json())
    .then(data => {
      let csv = 'Name,Value,Stage,Probability\n';
      data.deals.forEach(deal => {
        csv += `${deal.name},${deal.amount},${deal.stage},${deal.probability}\n`;
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'crm-export.csv';
      a.click();
      URL.revokeObjectURL(url);
    });
  addActivity('Vicky', 'CRM-export genererad', 'vicky');
}
</script>
</body>
</html>
